<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>小花猫的库</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 主题样式，可以换成其他主题，比如 buble.css 等 -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
</head>
<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: '小花猫', // 你的网站标题
            repo: '', // 如果你有GitHub仓库地址，可以填在这里，会在右上角生成一个链接
            loadSidebar: true, // 启用侧边栏，会加载 _sidebar.md
            loadNavbar: true,  // 启用导航栏，会加载 _navbar.md
            coverpage: false,  // 先不开启封面，保持简洁
            maxLevel: 3,       // 侧边栏目录最多显示到三级标题
            subMaxLevel: 3,    // 页面内目录最多显示到三级标题
            search: {
                paths: 'auto',
                placeholder: '搜索',
                noData: '找不到结果',
                depth: 3
            },
        }
    </script>
    <!-- Docsify 核心库 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- 搜索插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- 代码复制插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <!-- 图片放大插件 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <!-- 可选：emoji 支持 -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
</body>
</html>
